<style>
  /* Legacy aliases — many AK* components reference --navy/--teal/--cream/--ink-*  */
  :root {
    --navy: var(--zb-navy);
    --navy-2: var(--zb-navy-2);
    --navy-soft: var(--zb-navy-soft);
    --teal: var(--zb-teal);
    --teal-deep: var(--zb-teal-deep);
    --cream: var(--zb-cream);
    --cream-2: var(--zb-cream-2);
    --white: var(--zb-white);
    --ink: var(--zb-ink);
    --ink-2: var(--zb-ink-2);
    --ink-3: var(--zb-ink-3);
    --line: var(--zb-line);
    --line-soft: var(--zb-line-soft);
  }
  * { box-sizing: border-box; }
  body { overflow-x: hidden; }

  /* Dot background — used inside navy sections (hero, TUI section, audit) */
  .dotbg {
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
    background-size: 24px 24px;
  }

  /* Corner ticks decoration — used around the hero spec card.
     Four pin-stripe L's drawn on the corners; uses the inner <i /> element
     plus ::before / ::after on it to address all four corners. */
  .corner-ticks { position: relative; }
  .corner-ticks::before,
  .corner-ticks::after {
    content: "";
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--zb-teal);
    border-style: solid;
    border-width: 0;
    pointer-events: none;
  }
  .corner-ticks::before { top: 8px; left:  8px; border-top-width: 1px; border-left-width: 1px;  }
  .corner-ticks::after  { top: 8px; right: 8px; border-top-width: 1px; border-right-width: 1px; }
  .corner-ticks > i {
    position: absolute;
    inset: 0;
    pointer-events: none;
    font-style: normal;
  }
  .corner-ticks > i::before,
  .corner-ticks > i::after {
    content: "";
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--zb-teal);
    border-style: solid;
    border-width: 0;
  }
  .corner-ticks > i::before { bottom: 8px; left:  8px; border-bottom-width: 1px; border-left-width: 1px;  }
  .corner-ticks > i::after  { bottom: 8px; right: 8px; border-bottom-width: 1px; border-right-width: 1px; }

  /* ---------- TUI mockup styles ---------- */
  .tui {
    background: #001226;
    color: #DCE6F2;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.55;
    padding: 22px 26px;
    border: 1px solid rgba(0, 209, 178, 0.28);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    height: 100%;
  }
  .tui::before {
    /* subtle scanline */
    content: "";
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0,
      rgba(255,255,255,0) 3px,
      rgba(255,255,255,0.015) 3px,
      rgba(255,255,255,0.015) 4px
    );
    pointer-events: none;
  }
  .tui .teal  { color: var(--zb-teal); }
  .tui .muted { color: rgba(255,255,255,0.45); }
  .tui .warn  { color: #FFB85B; }
  .tui .label { color: rgba(255,255,255,0.55); }

  /* View transition */
  .view-enter { animation: viewIn 0.45s cubic-bezier(0.2, 0.7, 0.2, 1); }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
