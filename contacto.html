<style>
  :root {
    --navy: #00274D;
    --navy-2: #001a36;
    --navy-soft: #14365e;
    --teal: #00D1B2;
    --teal-deep: #00b59a;
    --cream: #F4F1EA;
    --cream-2: #ECE7DB;
    --white: #ffffff;
    --ink: #0f1a2b;
    --ink-2: #3a4a5e;
    --ink-3: #6b7a8e;
    --line: #d9d3c3;
    --line-soft: #e8e3d4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow .dot {
    width: 6px; height: 6px; background: var(--teal); border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(0,209,178,0.18);
  }
  .btn {
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 14px;
    padding: 14px 22px;
    border-radius: 2px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { background: var(--navy-2); transform: translateY(-1px); }
  .btn-teal { background: var(--teal); color: var(--navy); font-weight: 600; }
  .btn-teal:hover { background: var(--teal-deep); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--navy); border: 1px solid var(--navy); }
  .btn-ghost:hover { background: var(--navy); color: #fff; }
  .btn-ghost-light { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.35); }
  .btn-ghost-light:hover { background: rgba(255,255,255,0.08); border-color: #fff; }

  .view-enter { animation: viewIn 0.45s cubic-bezier(0.2, 0.7, 0.2, 1); }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Contact-specific responsive tweaks */
  @media (max-width: 760px) {
    .rs-contact-grid { grid-template-columns: 1fr !important; }
    .rs-contact-grid > div { padding: 28px !important; }
    .rs-office-split { grid-template-columns: 1fr !important; gap: 28px !important; }
  }
  @media (max-width: 600px) {
    .rs-contact-strip { flex-direction: column !important; align-items: flex-start !important; gap: 20px !important; }
  }

  ::selection { background: var(--teal); color: var(--navy); }
</style>
