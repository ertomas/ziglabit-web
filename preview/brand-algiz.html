<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display: flex; gap: 24px; align-items: center;">
  <!-- Algiz watermark example -->
  <div style="position: relative; flex: 1; background: #00274D; border-radius: 2px; padding: 28px; min-height: 200px; overflow: hidden; color: #fff;">
    <div style="position: absolute; right: -30px; top: -30px; opacity: 0.12;">
      <svg width="240" height="240" viewBox="0 0 240 240" fill="none">
        <path d="M120 24 L120 216" stroke="#00D1B2" stroke-width="2"/>
        <path d="M120 24 L40 100" stroke="#00D1B2" stroke-width="2"/>
        <path d="M120 24 L200 100" stroke="#00D1B2" stroke-width="2"/>
      </svg>
    </div>
    <div style="position: relative;">
      <div style="font-family:'JetBrains Mono'; font-size: 11px; color: #00D1B2; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px;">ALGIZ WATERMARK</div>
      <div style="font-family:'Poppins'; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 8px;">Protección · Fuerza · Progreso.</div>
      <div style="font-family:'Poppins'; font-size: 13px; color: rgba(255,255,255,0.7);">Opacidad 0.05–0.12 sobre fondos navy o crema.</div>
    </div>
  </div>
  <!-- Algiz mark solo -->
  <div style="background: #F4F1EA; border: 1px solid #D9D3C3; border-radius: 2px; padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
    <svg width="64" height="80" viewBox="0 0 64 80" fill="none">
      <path d="M32 8 L32 72" stroke="#00274D" stroke-width="2.5"/>
      <path d="M32 8 L8 30" stroke="#00D1B2" stroke-width="2.5"/>
      <path d="M32 8 L56 30" stroke="#00274D" stroke-width="2.5"/>
      <circle cx="32" cy="72" r="2.5" fill="#00D1B2"/>
    </svg>
    <div class="label">ALGIZ MARK</div>
  </div>
</div>
</body></html>
