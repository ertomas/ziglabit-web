<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:flex; gap: 20px; align-items: center;">
  <!-- Icon set -->
  <div style="display: grid; grid-template-columns: repeat(4, 36px); gap: 14px; padding: 18px; background: #fff; border: 1px solid #D9D3C3; border-radius: 2px;">
    <svg width="36" height="36" viewBox="0 0 16 16" fill="none"><path d="M2 8h11M8.5 3.5L13 8l-4.5 4.5" stroke="#00274D" stroke-width="1.5" stroke-linecap="square"/></svg>
    <svg width="36" height="36" viewBox="0 0 16 16" fill="none"><path d="M14 8H3M7.5 3.5L3 8l4.5 4.5" stroke="#00274D" stroke-width="1.5" stroke-linecap="square"/></svg>
    <svg width="36" height="36" viewBox="0 0 16 16" fill="none"><path d="M4 12L12 4M5.5 4H12v6.5" stroke="#00274D" stroke-width="1.5" stroke-linecap="square"/></svg>
    <svg width="36" height="36" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="#00274D" stroke-width="1.5"/></svg>
    <svg width="36" height="36" viewBox="0 0 14 14" fill="none"><path d="M2 7.5L5.5 11L12 4" stroke="#00274D" stroke-width="1.8" stroke-linecap="square"/></svg>
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 5v6.5c0 4.5 3.2 8.6 8 10.5 4.8-1.9 8-6 8-10.5V5l-8-3z" stroke="#00274D" stroke-width="1.5"/></svg>
    <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
      <path d="M24 6 L24 42" stroke="#00274D" stroke-width="2.5"/>
      <path d="M24 6 L10 20" stroke="#00D1B2" stroke-width="2.5"/>
      <path d="M24 6 L38 20" stroke="#00274D" stroke-width="2.5"/>
    </svg>
  </div>
  <div style="flex:1; padding-left: 8px;">
    <div style="font-family:'Poppins'; font-size: 14px; font-weight: 600; color: #00274D; margin-bottom: 8px;">Custom set, stroke-square</div>
    <div style="font-family:'Poppins'; font-size: 13px; color: #3A4A5E; line-height: 1.55;">Lineales 1.5–2px, <code style="font-family:'JetBrains Mono'; font-size: 12px;">stroke-linecap: square</code>. Sin emoji, sin unicode como iconos. Para nuevos iconos: Lucide, ajustado a square.</div>
  </div>
</div>
</body></html>
