<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:flex; gap: 16px;">
  <div style="flex:1; background: #00274D; border-radius: 2px; padding: 22px; min-height: 160px; position: relative; overflow: hidden;">
    <div style="position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0); background-size: 24px 24px;"></div>
    <div style="position: relative;">
      <div style="font-family:'JetBrains Mono'; font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.15em; text-transform: uppercase;">DOT PATTERN · NAVY</div>
      <div style="margin-top: 12px; font-family:'Poppins'; font-size: 13px; color: rgba(255,255,255,0.78);">Textura sutil sobre fondos oscuros.</div>
    </div>
  </div>
  <div style="flex:1; background: #F4F1EA; border: 1px solid #D9D3C3; border-radius: 2px; padding: 22px; min-height: 160px; position: relative; overflow: hidden;">
    <div style="position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(0,39,77,0.08) 1px, transparent 0); background-size: 20px 20px;"></div>
    <div style="position: relative;">
      <div style="font-family:'JetBrains Mono'; font-size: 11px; color: #6B7A8E; letter-spacing: 0.15em; text-transform: uppercase;">DOT PATTERN · CREAM</div>
      <div style="margin-top: 12px; font-family:'Poppins'; font-size: 13px; color: #3A4A5E;">Variante para fondos claros.</div>
    </div>
  </div>
</div>
</body></html>
