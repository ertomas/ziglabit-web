<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="swatch-grid" style="grid-template-columns: repeat(5, 1fr);">
    <div class="swatch">
      <div class="swatch-color" style="background:#00274D;"></div>
      <div class="swatch-meta"><span class="swatch-name">Navy</span><span class="swatch-hex">#00274D</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#001A36;"></div>
      <div class="swatch-meta"><span class="swatch-name">Navy 2</span><span class="swatch-hex">#001A36</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#14365E;"></div>
      <div class="swatch-meta"><span class="swatch-name">Navy soft</span><span class="swatch-hex">#14365E</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#00D1B2;"></div>
      <div class="swatch-meta"><span class="swatch-name">Teal</span><span class="swatch-hex">#00D1B2</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#00B59A;"></div>
      <div class="swatch-meta"><span class="swatch-name">Teal deep</span><span class="swatch-hex">#00B59A</span></div>
    </div>
  </div>
</div>
</body></html>
