<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="swatch-grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch">
      <div class="swatch-color" style="background:#0F1A2B;"></div>
      <div class="swatch-meta"><span class="swatch-name">Ink</span><span class="swatch-hex">#0F1A2B</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#3A4A5E;"></div>
      <div class="swatch-meta"><span class="swatch-name">Ink 2</span><span class="swatch-hex">#3A4A5E</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#6B7A8E;"></div>
      <div class="swatch-meta"><span class="swatch-name">Ink 3</span><span class="swatch-hex">#6B7A8E</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#FF6B5B;"></div>
      <div class="swatch-meta"><span class="swatch-name">Alert</span><span class="swatch-hex">#FF6B5B</span></div>
    </div>
  </div>
</div>
</body></html>
