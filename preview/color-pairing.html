<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:flex; gap: 16px;">
  <div style="flex:1; background: #F4F1EA; padding: 20px; border: 1px solid #D9D3C3; border-radius: 2px;">
    <div class="label" style="margin-bottom: 16px;">CREAM SURFACE</div>
    <div style="font-family: 'Poppins'; font-size: 22px; font-weight: 600; color: #00274D; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px;">Defensa que se mide.</div>
    <div style="font-size: 13px; color: #3A4A5E; line-height: 1.5;">Texto secundario sobre la superficie principal de la marca.</div>
  </div>
  <div style="flex:1; background: #00274D; padding: 20px; border-radius: 2px; color: #fff;">
    <div class="label" style="margin-bottom: 16px; color: #00D1B2;">NAVY SURFACE</div>
    <div style="font-family: 'Poppins'; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px;">Una capa. <span style="color:#00D1B2;">Toda</span> tu defensa.</div>
    <div style="font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.5;">Teal como acento sobre el oscuro de marca.</div>
  </div>
</div>
</body></html>
