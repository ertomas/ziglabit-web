<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="swatch-grid" style="grid-template-columns: repeat(5, 1fr);">
    <div class="swatch">
      <div class="swatch-color" style="background:#F4F1EA;"></div>
      <div class="swatch-meta"><span class="swatch-name">Cream</span><span class="swatch-hex">#F4F1EA</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#ECE7DB;"></div>
      <div class="swatch-meta"><span class="swatch-name">Cream 2</span><span class="swatch-hex">#ECE7DB</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#FFFFFF;"></div>
      <div class="swatch-meta"><span class="swatch-name">White</span><span class="swatch-hex">#FFFFFF</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#D9D3C3;"></div>
      <div class="swatch-meta"><span class="swatch-name">Line</span><span class="swatch-hex">#D9D3C3</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#E8E3D4;"></div>
      <div class="swatch-meta"><span class="swatch-name">Line soft</span><span class="swatch-hex">#E8E3D4</span></div>
    </div>
  </div>
</div>
</body></html>
