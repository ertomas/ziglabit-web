<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:flex; flex-direction: column; gap: 14px;">
  <div style="display:flex; gap: 12px; align-items: center;">
    <button style="font-family:'Poppins'; font-weight: 500; font-size: 14px; padding: 14px 22px; border-radius: 2px; border: none; background:#00274D; color: #fff; display: inline-flex; align-items: center; gap: 10px; cursor: pointer;">Solicitar demo <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8h11M8.5 3.5L13 8l-4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg></button>
    <button style="font-family:'Poppins'; font-weight: 600; font-size: 14px; padding: 14px 22px; border-radius: 2px; border: none; background:#00D1B2; color: #00274D; display: inline-flex; align-items: center; gap: 10px; cursor: pointer;">Agendar diagnóstico <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8h11M8.5 3.5L13 8l-4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg></button>
    <button style="font-family:'Poppins'; font-weight: 500; font-size: 14px; padding: 13px 21px; border-radius: 2px; background: transparent; color: #00274D; border: 1px solid #00274D; cursor: pointer;">Ver plataforma</button>
  </div>
  <div style="background:#00274D; padding: 14px; border-radius: 2px; display: flex; gap: 12px;">
    <button style="font-family:'Poppins'; font-weight: 600; font-size: 14px; padding: 14px 22px; border-radius: 2px; border: none; background:#00D1B2; color: #00274D; display: inline-flex; align-items: center; gap: 10px; cursor: pointer;">Conocer Algiz</button>
    <button style="font-family:'Poppins'; font-weight: 500; font-size: 14px; padding: 13px 21px; border-radius: 2px; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.35); cursor: pointer;">Hablar con ventas</button>
  </div>
</div>
</body></html>
