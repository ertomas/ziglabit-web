<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:flex; gap: 16px;">
  <div style="flex: 1; background: #fff; border: 1px solid #D9D3C3; border-radius: 2px; padding: 24px; min-height: 200px; display:flex; flex-direction: column; gap: 12px;">
    <div style="display:flex; justify-content: space-between; align-items: flex-start;">
      <div style="font-family:'JetBrains Mono'; font-size: 11px; letter-spacing: 0.15em; color: #6B7A8E; text-transform: uppercase;">01 — BANCA</div>
      <div style="width: 28px; height: 28px; border: 1px solid #D9D3C3; display: flex; align-items: center; justify-content: center;">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M4 12L12 4M5.5 4H12v6.5" stroke="#00274D" stroke-width="1.5" stroke-linecap="square"/></svg>
      </div>
    </div>
    <div style="font-family:'Poppins'; font-size: 22px; font-weight: 600; color: #00274D; letter-spacing: -0.02em; line-height: 1.15;">Defensa para core bancario</div>
    <div style="font-family:'Poppins'; font-size: 13px; color: #3A4A5E; line-height: 1.55;">Protección integral para core, canales digitales y plataformas corporativas.</div>
  </div>
  <div style="flex: 1; background: #00274D; color: #fff; border-radius: 2px; padding: 24px; min-height: 200px; display:flex; flex-direction: column; gap: 12px; position: relative; overflow: hidden;">
    <div style="position:absolute; right:-20px; top:-20px; opacity: 0.12;">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
        <path d="M60 12 L60 108" stroke="#00D1B2" stroke-width="1.5"/>
        <path d="M60 12 L20 52" stroke="#00D1B2" stroke-width="1.5"/>
        <path d="M60 12 L100 52" stroke="#00D1B2" stroke-width="1.5"/>
      </svg>
    </div>
    <div style="display:flex; justify-content: space-between; align-items: flex-start; position: relative;">
      <div style="font-family:'JetBrains Mono'; font-size: 11px; letter-spacing: 0.15em; color: #00D1B2; text-transform: uppercase;">02 — HOVER STATE</div>
      <div style="width: 28px; height: 28px; border: 1px solid #00D1B2; background:#00D1B2; display: flex; align-items: center; justify-content: center;">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M4 12L12 4M5.5 4H12v6.5" stroke="#00274D" stroke-width="1.5" stroke-linecap="square"/></svg>
      </div>
    </div>
    <div style="font-family:'Poppins'; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; position: relative;">FinTech & Pagos</div>
    <div style="font-family:'Poppins'; font-size: 13px; color: rgba(255,255,255,0.78); line-height: 1.55; position: relative;">Gateway de pagos con WAF, tokenización y validación 3DS de extremo a extremo.</div>
  </div>
</div>
</body></html>
