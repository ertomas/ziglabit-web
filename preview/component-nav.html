<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="background: rgba(244,241,234,0.92); backdrop-filter: blur(12px); border: 1px solid #E8E3D4; border-radius: 2px; padding: 16px 22px; display: flex; align-items: center; justify-content: space-between;">
    <div style="font-family:'Poppins'; font-size: 17px; font-weight: 700; color: #00274D; letter-spacing: -0.02em;">Zigla<span style="font-weight: 400;">bit</span></div>
    <div style="display: flex; gap: 28px;">
      <span style="font-family:'Poppins'; font-size: 13px; font-weight: 500; color: #00274D; opacity: 0.85;">Soluciones</span>
      <span style="font-family:'Poppins'; font-size: 13px; font-weight: 500; color: #00274D; opacity: 0.85;">Sectores</span>
      <span style="font-family:'Poppins'; font-size: 13px; font-weight: 500; color: #00274D; opacity: 0.85;">Plataforma</span>
      <span style="font-family:'Poppins'; font-size: 13px; font-weight: 500; color: #00274D; opacity: 0.85;">Compañía</span>
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <span style="font-family:'Poppins'; font-size: 13px; font-weight: 500; color: #00274D;">Ingresar</span>
      <button style="font-family:'Poppins'; font-weight: 500; font-size: 12px; padding: 10px 16px; border-radius: 2px; border: none; background:#00274D; color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;">Solicitar demo →</button>
    </div>
  </div>
</div>
</body></html>
