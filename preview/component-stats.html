<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="background: #fff; border: 1px solid #D9D3C3; border-radius: 2px; display: grid; grid-template-columns: repeat(4, 1fr); overflow: hidden;">
    <div style="padding: 22px; border-right: 1px solid #E8E3D4;">
      <div style="font-family:'JetBrains Mono'; font-size: 32px; font-weight: 500; color: #00274D; letter-spacing: -0.03em; line-height: 1;">78%</div>
      <div style="margin-top: 12px; font-family:'Poppins'; font-size: 12px; font-weight: 500; color: #00274D;">Reducción falsos +</div>
    </div>
    <div style="padding: 22px; border-right: 1px solid #E8E3D4;">
      <div style="font-family:'JetBrains Mono'; font-size: 32px; font-weight: 500; color: #00274D; letter-spacing: -0.03em; line-height: 1;">9 sem</div>
      <div style="margin-top: 12px; font-family:'Poppins'; font-size: 12px; font-weight: 500; color: #00274D;">Despliegue medio</div>
    </div>
    <div style="padding: 22px; border-right: 1px solid #E8E3D4;">
      <div style="font-family:'JetBrains Mono'; font-size: 32px; font-weight: 500; color: #00274D; letter-spacing: -0.03em; line-height: 1;">0</div>
      <div style="margin-top: 12px; font-family:'Poppins'; font-size: 12px; font-weight: 500; color: #00274D;">Brechas producción</div>
    </div>
    <div style="padding: 22px;">
      <div style="font-family:'JetBrains Mono'; font-size: 32px; font-weight: 500; color: #00274D; letter-spacing: -0.03em; line-height: 1;">47ms</div>
      <div style="margin-top: 12px; font-family:'Poppins'; font-size: 12px; font-weight: 500; color: #00274D;">Latencia p95</div>
    </div>
  </div>
</div>
</body></html>
