<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:flex; gap: 32px; align-items: center;">
  <div style="display:flex; flex-direction: column; align-items: center; gap: 12px;">
    <div style="width: 110px; height: 90px; background: #fff; border: 1px solid #D9D3C3; border-radius: 2px;"></div>
    <div class="label">BORDE 1PX</div>
  </div>
  <div style="display:flex; flex-direction: column; align-items: center; gap: 12px;">
    <div style="width: 110px; height: 90px; background: #fff; box-shadow: 0 2px 8px rgba(0,39,77,0.06); border-radius: 2px;"></div>
    <div class="label">SOFT</div>
  </div>
  <div style="display:flex; flex-direction: column; align-items: center; gap: 12px;">
    <div style="width: 110px; height: 90px; background: #00274D; box-shadow: 0 30px 60px -20px rgba(0,39,77,0.35); border-radius: 2px;"></div>
    <div class="label">DRAMATIC (RARE)</div>
  </div>
  <div style="flex: 1; padding-left: 16px; border-left: 1px solid #D9D3C3;">
    <div style="font-family:'Poppins'; font-size: 13px; color: #3A4A5E; line-height: 1.55;">Por defecto: <strong style="color:#00274D;">bordes 1px</strong>, no sombras. La sombra dramática se reserva para un único elemento por vista — el panel de telemetría del hero.</div>
  </div>
</div>
</body></html>
