<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:flex; gap: 24px; align-items: center;">
  <div style="display:flex; flex-direction: column; align-items: center; gap: 10px;">
    <div style="width: 72px; height: 72px; background: #fff; border: 1px solid #D9D3C3; border-radius: 0;"></div>
    <div class="label">0px</div>
  </div>
  <div style="display:flex; flex-direction: column; align-items: center; gap: 10px;">
    <div style="width: 72px; height: 72px; background: #fff; border: 1px solid #D9D3C3; border-radius: 2px;"></div>
    <div class="label">2px</div>
  </div>
  <div style="display:flex; flex-direction: column; align-items: center; gap: 10px;">
    <div style="width: 72px; height: 72px; background: #fff; border: 1px solid #D9D3C3; border-radius: 4px;"></div>
    <div class="label">4px MAX</div>
  </div>
  <div style="flex: 1; padding-left: 16px; border-left: 1px solid #D9D3C3;">
    <div style="font-family:'Poppins'; font-size: 14px; font-weight: 600; color: #00274D; margin-bottom: 6px;">Radios deliberadamente pequeños</div>
    <div style="font-family:'Poppins'; font-size: 12.5px; color: #3A4A5E; line-height: 1.5;">El feel es preciso, técnico, no "amistoso". 4px es el máximo en cualquier card; 2px para inputs y chips; 0 para divisores y secciones.</div>
  </div>
</div>
</body></html>
